<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 140" width="440" height="140">
  <!-- Background -->
  <rect width="440" height="140" fill="white"/>
  <!-- Green emblem circle -->
  <circle cx="70" cy="70" r="56" fill="#008000"/>
  <circle cx="70" cy="70" r="50" fill="white"/>
  <circle cx="70" cy="70" r="44" fill="#008000"/>
  <!-- Eagle silhouette (simplified) -->
  <path d="M70 35 L82 60 L96 55 L78 72 L85 90 L70 78 L55 90 L62 72 L44 55 L58 60 Z" fill="white"/>
  <!-- NEPC text inside circle -->
  <text x="70" y="126" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#008000" text-anchor="middle" letter-spacing="2">NEPC</text>
  <!-- Full name -->
  <text x="260" y="45" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#008000" text-anchor="middle">NEPC</text>
  <line x1="145" y1="60" x2="380" y2="60" stroke="#008000" stroke-width="1.5"/>
  <text x="260" y="82" font-family="Arial, sans-serif" font-size="13" fill="#333333" text-anchor="middle">Nigerian Export</text>
  <text x="260" y="100" font-family="Arial, sans-serif" font-size="13" fill="#333333" text-anchor="middle">Promotion Council</text>
  <text x="260" y="120" font-family="Arial, sans-serif" font-size="10" fill="#666666" text-anchor="middle">Federal Government of Nigeria</text>
</svg>
